name: TimeCook
options:
  bundleIdPrefix: com.vibecode
  deploymentTarget:
    iOS: "15.1"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.1
    CURRENT_PROJECT_VERSION: 2
    DEVELOPMENT_TEAM: PJQSSVQC5P
packages:
  TimeCookCore:
    path: TimeCookCore
targets:
  TimeCook:
    type: application
    platform: iOS
    deploymentTarget: "15.1"
    sources:
      - path: TimeCook
    dependencies:
      - package: TimeCookCore
      - target: TimeCookLiveActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibecode.timecook
        INFOPLIST_FILE: TimeCook/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    postCompileScripts: []
  TimeCookLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - path: TimeCookLiveActivity
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
      - package: TimeCookCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibecode.timecook.LiveActivity
        INFOPLIST_FILE: TimeCookLiveActivity/Info.plist
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES
  TimeCookTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.1"
    sources:
      - path: TimeCookTests
    dependencies:
      - target: TimeCook
      - package: TimeCookCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vibecode.timecook.tests
schemes:
  TimeCook:
    build:
      targets:
        TimeCook: all
        TimeCookLiveActivity: all
        TimeCookTests: [test]
    test:
      targets:
        - TimeCookTests
